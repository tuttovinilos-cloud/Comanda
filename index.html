<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clientes y Pedidos</title>
</head>
<body>

<h2>Agregar / Fusionar Cliente</h2>
<input type="text" id="clienteInput" placeholder="Nombre cliente">
<button onclick="handleGuardar()">Guardar</button>

<h2>Lista de Clientes</h2>
<ul id="listaClientes"></ul>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js'

const supabase = createClient(
  'https://TU_URL.supabase.co',
  'TU_ANON_KEY'
)

// -------- NORMALIZAR --------
function normalizarNombre(nombre) {
  return nombre.trim().toLowerCase();
}

// -------- GUARDAR / FUSIONAR --------
async function guardarCliente(nombreNuevo) {
  const nombreNormalizado = normalizarNombre(nombreNuevo);

  const { data: clientes, error } = await supabase
    .from('clientes')
    .select('*');

  if (error) {
    console.error(error);
    return;
  }

  const clienteExistente = clientes.find(c =>
    normalizarNombre(c.nombre) === nombreNormalizado
  );

  if (clienteExistente) {
    const fusionar = confirm(
      `Ya existe "${clienteExistente.nombre}". ¿Deseas fusionarlo?`
    );

    if (!fusionar) return;

    // FUSIONAR pedidos
    const { error: errorFusion } = await supabase
      .from('pedidos')
      .update({ cliente: clienteExistente.nombre })
      .eq('cliente', nombreNuevo);

    if (errorFusion) {
      console.error(errorFusion);
      alert('Error al fusionar');
      return;
    }

    alert('Clientes fusionados ✔️');
    return;
  }

  // INSERTAR NUEVO
  const { error: insertError } = await supabase
    .from('clientes')
    .insert([{ nombre: nombreNuevo }]);

  if (insertError) {
    console.error(insertError);
    alert('Error al guardar');
    return;
  }

  alert('Cliente agregado ✔️');
}

// -------- CONTAR PEDIDOS REAL --------
async function cargarClientes() {
  const lista = document.getElementById('listaClientes');
  lista.innerHTML = '';

  const { data: clientes, error } = await supabase
    .from('clientes')
    .select('*');

  if (error) {
    console.error(error);
    return;
  }

  for (const cliente of clientes) {
    const { count, error: countError } = await supabase
      .from('pedidos')
      .select('*', { count: 'exact', head: true })
      .eq('cliente', cliente.nombre);

    if (countError) {
      console.error(countError);
      continue;
    }

    const li = document.createElement('li');
    li.textContent = `${cliente.nombre} - Pedidos: ${count || 0}`;
    lista.appendChild(li);
  }
}

// -------- EVENTO --------
window.handleGuardar = async () => {
  const input = document.getElementById('clienteInput');
  const nombre = input.value.trim();

  if (!nombre) {
    alert('Escribe un nombre');
    return;
  }

  await guardarCliente(nombre);
  input.value = '';
  await cargarClientes();
};

// -------- INIT --------
cargarClientes();

</script>

</body>
</html>
